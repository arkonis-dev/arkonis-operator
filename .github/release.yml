changelog:
  categories:
    - title: "New Features"
      labels:
        - "feat"
    - title: "Bug Fixes"
      labels:
        - "fix"
    - title: "Documentation"
      labels:
        - "docs"
    - title: "Other Changes"
      labels:
        - "chore"
        - "refactor"
        - "test"
        - "ci"
