name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".custom-gcl.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".custom-gcl.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache golangci-lint binary
        uses: actions/cache@v4
        with:
          path: bin/
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('.custom-gcl.yml', 'Makefile') }}

      - name: Check linter configuration
        run: make lint-config
      - name: Run linter
        run: make lint
