              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentDeploymentSpec defines the desired state of AgentDeployment.
            properties:
              configRef:
                description: ConfigRef optionally references an AgentConfig for shared
                  settings.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - name
                type: object
              limits:
                description: Limits constrains agent resource usage.
                properties:
                  maxConcurrentTasks:
                    default: 5
                    description: MaxConcurrentTasks is the maximum number of tasks
