                    type: integer
                  maxTokensPerCall:
                    default: 8000
                    description: MaxTokensPerCall is the maximum number of tokens
                      per Anthropic API call.
                    type: integer
                  timeoutSeconds:
                    default: 120
                    description: TimeoutSeconds is the per-task deadline.
                    type: integer
                type: object
              livenessProbe:
                description: LivenessProbe defines how agent health is evaluated.
                properties:
                  intervalSeconds:
                    default: 30
                    description: IntervalSeconds is how often the probe runs.
                    type: integer
