# arkonis-api-keys — required before deploying any ArkAgent.
#
# This Secret is mounted into every agent pod via EnvFrom. Create it once per
# namespace where ArkAgents will run. Add the API key for your chosen
# LLM provider — the operator injects the entire secret as environment variables.
#
# Anthropic (default provider):
#   kubectl create secret generic arkonis-api-keys \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=TASK_QUEUE_URL=redis:6379 \
#     --namespace default
#
# Or apply this file after filling in the base64-encoded values:
#   echo -n "sk-ant-..." | base64
#   echo -n "redis:6379" | base64
#
# TASK_QUEUE_URL is always required regardless of provider.
# The API key name matches the provider's environment variable convention
# (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.).
#
apiVersion: v1
kind: Secret
metadata:
  name: arkonis-api-keys
  namespace: default   # change to match your ArkAgent namespace
type: Opaque
data:
  # base64-encoded API key for your LLM provider (example: Anthropic)
  ANTHROPIC_API_KEY: <base64-encoded-api-key>
  # base64-encoded Redis address — matches TASK_QUEUE_URL expected by the runtime
  TASK_QUEUE_URL: <base64-encoded-redis-addr>
