apiVersion: arkonis.dev/v1alpha1
kind: ArkEvent
metadata:
  name: daily-report-trigger
  namespace: default
spec:
  source:
    type: cron
    cron: "0 9 * * 1-5"   # 09:00 UTC on weekdays
  targets:
    - pipeline: report-pipeline
      input:
        reportDate: "{{ .trigger.firedAt }}"
  concurrencyPolicy: Forbid
  suspended: false
