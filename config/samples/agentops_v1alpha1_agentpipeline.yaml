apiVersion: agentops.agentops.io/v1alpha1
kind: AgentPipeline
metadata:
  name: research-then-summarize
  namespace: default
spec:
  input:
    topic: "AI in healthcare"
  steps:
    - name: research
      agentDeployment: research-agent
      inputs:
        prompt: "Research the following topic thoroughly: {{ .pipeline.input.topic }}"

    - name: summarize
      agentDeployment: summarizer-agent
      dependsOn:
        - research
      inputs:
        prompt: "Summarize the following research findings:\n\n{{ .steps.research.output }}"

  output: "{{ .steps.summarize.output }}"
