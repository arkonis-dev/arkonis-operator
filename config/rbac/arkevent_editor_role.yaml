---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ark-operator
    app.kubernetes.io/managed-by: kustomize
  name: arkevent-editor-role
rules:
  - apiGroups:
      - arkonis.dev
    resources:
      - arkevents
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - arkonis.dev
    resources:
      - arkevents/status
    verbs:
      - get
