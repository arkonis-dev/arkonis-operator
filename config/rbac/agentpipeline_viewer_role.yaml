# This rule is not used by the project agentops itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to agentops.agentops.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agentops
    app.kubernetes.io/managed-by: kustomize
  name: agentpipeline-viewer-role
rules:
- apiGroups:
  - agentops.agentops.io
  resources:
  - agentpipelines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentops.agentops.io
  resources:
  - agentpipelines/status
  verbs:
  - get
