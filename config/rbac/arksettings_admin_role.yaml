---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ark-operator
    app.kubernetes.io/managed-by: kustomize
  name: arksettings-admin-role
rules:
  - apiGroups:
      - arkonis.dev
    resources:
      - arksettings
    verbs:
      - "*"
  - apiGroups:
      - arkonis.dev
    resources:
      - arksettings/status
    verbs:
      - get
